services:
  # Backend API Service
  - type: web
    name: hms-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DATABASE_URL
        fromDatabase:
          name: hms-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-patient-portal.vercel.app,https://your-staff-portal.vercel.app

  # PostgreSQL Database
  - type: pserv
    name: hms-database
    plan: free
    databaseName: hospital_db
    user: postgres
